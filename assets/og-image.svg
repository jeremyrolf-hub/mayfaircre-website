<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#f4f1ea"/>
  <!-- hairline frame -->
  <rect x="64" y="64" width="1072" height="502" fill="none" stroke="#1a1916" stroke-opacity="0.14"/>

  <!-- eyebrow -->
  <text x="104" y="150" font-family="Helvetica, Arial, sans-serif" font-size="20"
        letter-spacing="4" font-weight="600" fill="#5b564c">DEMAND-LED LAND ORIGINATION</text>

  <!-- headline -->
  <text x="100" y="300" font-family="Georgia, 'Times New Roman', serif" font-size="84"
